name: Update Modrinth Description

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: 3.14

      - name: Install dependencies
        run: pip install requests

      - name: Update modrinth description
        env:
          MODRINTH_PROJECT_ID: ysmYXPgd  # https://modrinth.com/mod/shelf
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
        run: python .github/workflows/scripts/update_modrinth_description.py
