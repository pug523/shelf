name: Update Modrinth Description

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: 3.14

      - name: Install Dependencies
        run: pip install requests

      - name: Update Modrinth Description
        env:
          MODRINTH_PROJECT_ID: ysmYXPgd  # https://modrinth.com/mod/shelf
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
        run: python .github/workflows/scripts/update_modrinth_description.py
