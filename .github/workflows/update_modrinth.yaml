name: Update Modrinth Description

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.14

      - name: Install Dependencies
        run: pip install requests

      - name: Update Modrinth Description
        env:
          MODRINTH_PROJECT_ID: ysmYXPgd  # https://modrinth.com/mod/shelf
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
        run: python .github/workflows/scripts/update_modrinth_description.py
