name: Matrix Prepare

on:
  workflow_call:
    inputs:
      target_subproject:
        description: see release.yaml, for generating matrix entries
        type: string
        required: false
        default: ''
    outputs:
      matrix:
        description: The generated run matrix
        value: ${{ jobs.matrix_prep.outputs.matrix }}


jobs:
  matrix_prep:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: 3.14

      - id: setmatrix
        run: python .github/workflows/scripts/matrix.py
        env:
          TARGET_SUBPROJECT: ${{ inputs.target_subproject }}

    outputs:
      matrix: ${{ steps.setmatrix.outputs.matrix }}

