name: Matrix Prepare

on:
  workflow_call:
    inputs:
      target_subproject:
        description: see release.yaml, for generating matrix entries
        type: string
        required: false
        default: ''
    outputs:
      matrix:
        description: The generated run matrix
        value: ${{ jobs.matrix_prep.outputs.matrix }}


jobs:
  matrix_prep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: 3.14

      - id: setmatrix
        run: python .github/workflows/scripts/matrix.py
        env:
          TARGET_SUBPROJECT: ${{ inputs.target_subproject }}

    outputs:
      matrix: ${{ steps.setmatrix.outputs.matrix }}

