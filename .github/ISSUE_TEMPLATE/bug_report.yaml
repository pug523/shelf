name: Bug Report
description: Report a bug or rendering issue
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the form below as accurately as possible.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: e.g., When opening the ColorPickerOverlay on Minecraft 26.2, the game crashes with a NullPointerException...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How do we reproduce this issue?
      placeholder: |
        1. Open the config screen via ModMenu or /shelf config
        2. Click on any ColorPickerWidget
        3. Observe the crash / visual bug...
    validations:
      required: true
  - type: input
    id: mc-version
    attributes:
      label: Minecraft Version(s)
      placeholder: e.g., 1.21.11, 1.20.1
    validations:
      required: true
  - type: input
    id: fabric-version
    attributes:
      label: Fabric Loader / API Version
      placeholder: e.g., Loader 0.19.3, API 0.141.4
    validations:
      required: false
  - type: textarea
    id: mod-list
    attributes:
      label: Other Installed Mods (Optional)
      description: Mention any relevant mods (like ModMenu, Sodium, or other UI/rendering mods) that were active when the bug occurred.
      placeholder: e.g., ModMenu v11.0.0, Sodium v0.6.0
  - type: textarea
    id: crash-report
    attributes:
      label: Logs or Crash Reports
      description: Please paste your complete log files (`latest.log`) or crash reports here. Wrap them inside triple backticks to format them cleanly as a code block!
      placeholder: Paste log/stacktrace contents directly here...
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Video
      description: Drag and drop screenshots or paste video links that help illustrate the bug.
